# Self-hosting stack for poddaily — pulls published images from GHCR (no source build).
# Quick start: copy this folder, `cp .env.example .env`, fill it in, `docker compose up -d`.
# Full guide: ../SELF_HOSTING.md
#
# Web (Next.js admin UI) and api (Slack events receiver) must both be reachable from the
# internet — put them behind your reverse proxy / Dokploy domain mapping. The worker is
# internal only. Migrations run automatically on container start (any role), serialized
# by a Postgres advisory lock.
#
# Pin a version by setting PODDAILY_TAG in .env (e.g. PODDAILY_TAG=1 tracks major v1).

services:
  web:
    image: ghcr.io/maggit/poddaily:${PODDAILY_TAG:-latest}
    command: ["web"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://poddaily:${POSTGRES_PASSWORD}@postgres:5432/poddaily
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      # Optional display name shown in the landing page's instance banner + sign-in link.
      PODDAILY_INSTANCE_NAME: ${PODDAILY_INSTANCE_NAME:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Slack events receiver — the Slack app's request URL points at this service
  # (https://<api-domain>/slack/events).
  api:
    image: ghcr.io/maggit/poddaily:${PODDAILY_TAG:-latest}
    command: ["api"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://poddaily:${POSTGRES_PASSWORD}@postgres:5432/poddaily
      REDIS_URL: redis://redis:6379
      # Base URL of the web app — used to build "Connect to post as yourself" links on
      # bot-posted reports. Omit it and the link is skipped.
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: ghcr.io/maggit/poddaily:${PODDAILY_TAG:-latest}
    command: ["worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://poddaily:${POSTGRES_PASSWORD}@postgres:5432/poddaily
      REDIS_URL: redis://redis:6379
      # Enables the daily "Connect to post as yourself" nudge in standup DMs.
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "node dist/healthcheck.mjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: poddaily
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: poddaily
    volumes:
      # postgres:18 images moved the volume mount point from /var/lib/postgresql/data
      # to /var/lib/postgresql (data lives in <mount>/18/docker).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poddaily -d poddaily"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence so queued/delayed standup jobs survive a Redis restart.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
