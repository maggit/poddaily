display_information:
  name: poddaily
  description: Self-hosted daily standup bot
  background_color: "#1a1d21"
features:
  bot_user:
    display_name: poddaily
    always_online: true
oauth_config:
  redirect_urls:
    - https://poddaily.example.com/api/slack/oauth/callback
    - https://poddaily.example.com/api/auth/callback/slack
  scopes:
    user:
      - chat:write
      - openid
      - profile
      - email
    bot:
      - chat:write
      - chat:write.customize
      - im:write
      - im:history
      - users:read
      - users:read.email
      - channels:read
      - channels:history
      - groups:read
      - commands
settings:
  event_subscriptions:
    request_url: https://poddaily.example.com/api/slack/events
    bot_events:
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
