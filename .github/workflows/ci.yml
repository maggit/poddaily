# PR/main gate: builds the production Docker image without pushing, so Dockerfile or
# build breakage surfaces before a release tag does. Shares the GHA layer cache with
# release.yml, which keeps both fast.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # amd64 only: this is a smoke build for breakage, not a release; arm64 under QEMU
      # would roughly triple the job time for no extra signal.
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
