# Production stack for Dokploy (Docker Compose deployment).
# Local dev uses the separate root docker-compose.yml (Redis only) + the Supabase CLI.
# Postgres is external (Supabase) — not a service here.
# Set env vars (DATABASE_URL, AUTH_SECRET, NEXTAUTH_URL, SLACK_*, INTERNAL_API_SECRET) in
# Dokploy's environment panel; they're interpolated below.
#
# Services: web (Next.js), api (Bolt inbound DM), worker (BullMQ scheduler + outbound DM),
# and redis (BullMQ broker). Postgres remains external (Supabase).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    # Container listens on 0.0.0.0:3000 (HOSTNAME + PORT baked into the image).
    # In Dokploy, map your domain to this service on port 3000.
    expose:
      - "3000"

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    expose:
      - "3001"
    depends_on: [redis]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    depends_on: [redis]

volumes:
  redisdata:
